<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Komplete Geek – Free Phone Course for Seniors</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #0ea5e9;
    --navy: #0f172a;
    --mint: #10b981;
    --amber: #f59e0b;
    --rose: #f43f5e;
    --cream: #fefce8;
    --soft: #f0f9ff;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --radius: 18px;
    --shadow: 0 4px 24px rgba(0,0,0,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #e0f2fe 0%, #fefce8 50%, #ecfdf5 100%);
    min-height: 100vh;
    color: var(--text);
  }

/* -- SCREENS -- */
.screen { display: none; }
.screen.active { display: block; }

/* -- LOGIN -- */
#login-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.logo-wrap { text-align: center; margin-bottom: 32px; }
.logo-icon { font-size: 72px; line-height: 1; }
.logo-title {
  font-family: 'Fredoka One', cursive;
  font-size: 48px;
  color: var(--sky);
  letter-spacing: 1px;
}
.logo-sub { font-size: 18px; color: var(--muted); font-weight: 600; margin-top: 4px; }
.login-card {
  background: white;
  border-radius: var(--radius);
  padding: 40px 36px;
  box-shadow: var(--shadow);
  max-width: 440px;
  width: 100%;
  text-align: center;
}
.login-card h2 { font-size: 26px; font-weight: 800; margin-bottom: 8px; color: var(--navy); }
.login-card p { color: var(--muted); font-size: 16px; margin-bottom: 28px; line-height: 1.6; }
.login-card input {
  width: 100%;
  font-size: 22px;
  font-family: 'Nunito', sans-serif;
  padding: 16px 20px;
  border: 3px solid #e2e8f0;
  border-radius: 14px;
  margin-bottom: 20px;
  outline: none;
  transition: border 0.2s;
  font-weight: 700;
  text-align: center;
}
.login-card input:focus { border-color: var(--sky); }
.btn-big {
  display: inline-block;
  width: 100%;
  padding: 18px;
  font-size: 22px;
  font-weight: 800;
  font-family: 'Nunito', sans-serif;
  background: var(--sky);
  color: white;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: transform 0.1s, background 0.2s;
  letter-spacing: 0.5px;
}
.btn-big:hover { background: #0284c7; transform: translateY(-2px); }
.free-badge {
  display: inline-block;
  background: var(--mint);
  color: white;
  font-weight: 800;
  padding: 6px 20px;
  border-radius: 99px;
  font-size: 14px;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

/* -- DASHBOARD -- */
#dashboard-screen { padding: 0 0 60px; }
.top-bar {
  background: var(--navy);
  color: white;
  padding: 20px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.top-bar .brand {
  font-family: 'Fredoka One', cursive;
  font-size: 28px;
  color: var(--sky);
}
.top-bar .welcome { font-size: 16px; color: #94a3b8; }
.top-bar .user-chip {
  background: var(--sky);
  color: white;
  padding: 8px 18px;
  border-radius: 99px;
  font-weight: 800;
  font-size: 15px;
}
.progress-bar-wrap {
  background: #1e3a5f;
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.progress-label { color: #94a3b8; font-size: 14px; font-weight: 700; white-space: nowrap; }
.progress-track {
  flex: 1;
  height: 12px;
  background: #334155;
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--mint), var(--sky));
  border-radius: 99px;
  transition: width 0.5s ease;
}
.progress-pct { color: var(--mint); font-size: 14px; font-weight: 800; }

.section-header {
  padding: 32px 28px 8px;
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
}
.lessons-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 18px;
  padding: 12px 28px 28px;
}
.lesson-card {
  background: white;
  border-radius: var(--radius);
  padding: 22px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  border: 3px solid transparent;
  position: relative;
  overflow: hidden;
}
.lesson-card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,0.14); }
.lesson-card.completed { border-color: var(--mint); }
.lesson-card .cat-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 4px 12px;
  border-radius: 99px;
  margin-bottom: 12px;
}
.lesson-card h3 { font-size: 17px; font-weight: 800; color: var(--navy); margin-bottom: 6px; line-height: 1.3; }
.lesson-card p { font-size: 14px; color: var(--muted); line-height: 1.5; }
.lesson-card .check {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 28px;
  height: 28px;
  background: var(--mint);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 900;
  display: none;
}
.lesson-card.completed .check { display: flex; }
.lesson-card .emoji { font-size: 32px; margin-bottom: 10px; display: block; }

.cat-basics { background: #dbeafe; color: #1d4ed8; }
.cat-calls { background: #dcfce7; color: #166534; }
.cat-text { background: #fef9c3; color: #854d0e; }
.cat-apps { background: #fce7f3; color: #9d174d; }
.cat-safety { background: #fee2e2; color: #991b1b; }

/* -- LESSON SCREEN -- */
#lesson-screen { min-height: 100vh; background: var(--soft); }
.lesson-topbar {
  background: var(--navy);
  color: white;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.back-btn {
  background: #1e3a5f;
  border: none;
  color: white;
  padding: 10px 18px;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
}
.lesson-body { max-width: 760px; margin: 0 auto; padding: 32px 24px 80px; }
.step-card {
  background: white;
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
  border-left: 6px solid var(--sky);
  display: none;
}
.step-card.active { display: block; }
.quiz-box {
  background: #f0f9ff;
  border-radius: 14px;
  padding: 24px;
  margin-top: 24px;
  border: 2px solid var(--sky);
}
.quiz-opt {
  display: block;
  width: 100%;
  padding: 14px 20px;
  background: white;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
}
.quiz-opt.correct { border-color: var(--mint); background: #d1fae5; }
.quiz-opt.wrong { border-color: var(--rose); background: #fee2e2; }

@media (max-width: 600px) {
  .logo-title { font-size: 36px; }
  .lessons-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="login-screen" class="screen active">
  <div class="logo-wrap">
    <div class="logo-icon">📱</div>
    <div class="logo-title">Komplete Geek</div>
    <div class="logo-sub">The Free Phone Course for Seniors</div>
  </div>
  <div class="login-card">
    <span class="free-badge">✅ 100% FREE — No Password Needed!</span>
    <h2>Welcome! Let's Get Started</h2>
    <p>Just type a name or nickname below to start learning.</p>
    <input type="text" id="username-input" placeholder="e.g. MaryLou or Grandpa Joe" />
    <button class="btn-big" onclick="startCourse()">▶ Start Learning!</button>
  </div>
</div>

<div id="dashboard-screen" class="screen">
  <div class="top-bar">
    <div class="brand">📱 Komplete Geek</div>
    <div class="user-chip" id="user-chip">👤 Student</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-pct" id="progress-pct">0 of 20</div>
  </div>
  <div class="section-header">📚 Lessons</div>
  <div class="lessons-grid" id="grid-main"></div>
</div>

<div id="lesson-screen" class="screen">
  <div class="lesson-topbar">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h2 id="lesson-header-title">Lesson</h2>
  </div>
  <div class="lesson-body">
    <div id="steps-container"></div>
    <button class="btn-big" id="next-btn" onclick="nextStep()">Next Step ▶</button>
  </div>
</div>

<script>
/* Simple version of logic for demonstration */
const lessons = [
  { id: 0, cat: "basics", catLabel: "Basics", emoji: "📱", title: "Parts of Your Phone", subtitle: "Buttons and screens explained.", color: "cat-basics" },
  { id: 1, cat: "basics", catLabel: "Basics", emoji: "🔅", title: "Sight & Sound", subtitle: "Bigger text and louder volume.", color: "cat-basics" }
];

let userName = "Student";
let completedLessons = new Set();
let currentLessonIdx = 0;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startCourse() {
  const val = document.getElementById('username-input').value.trim();
  if (val) userName = val;
  document.getElementById('user-chip').textContent = "👤 " + userName;
  buildDashboard();
  showScreen('dashboard-screen');
}

function buildDashboard() {
  const grid = document.getElementById('grid-main');
  grid.innerHTML = '';
  lessons.forEach((l, i) => {
    const card = document.createElement('div');
    card.className = 'lesson-card' + (completedLessons.has(i) ? ' completed' : '');
    card.innerHTML = `<span class="emoji">${l.emoji}</span><h3>${l.title}</h3><p>${l.subtitle}</p>`;
    card.onclick = () => openLesson(i);
    grid.appendChild(card);
  });
}

function openLesson(idx) {
  currentLessonIdx = idx;
  document.getElementById('lesson-header-title').textContent = lessons[idx].title;
  document.getElementById('steps-container').innerHTML = `<div class="step-card active"><h3>Welcome to ${lessons[idx].title}</h3><p>Let's begin learning about this topic...</p></div>`;
  showScreen('lesson-screen');
}

function nextStep() {
  completedLessons.add(currentLessonIdx);
  goBack();
}

function goBack() {
  buildDashboard();
  showScreen('dashboard-screen');
}
</script>
</body>
</html>
